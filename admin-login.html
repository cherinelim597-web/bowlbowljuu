<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Healthy Bowl</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a1a2e, #0d2a45);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding: 40px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .admin-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: 48px 40px;
            border: 1px solid rgba(200,161,94,0.3);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 {
            font-family: 'Cinzel', serif;
            font-size: 36px;
            background: linear-gradient(135deg, #c8a15e, #f0d49e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo .badge {
            display: inline-block;
            background: rgba(200,161,94,0.2);
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: #c8a15e;
            margin-top: 12px;
        }
        .title { text-align: center; margin-bottom: 32px; }
        .title h2 { font-size: 28px; font-weight: 600; color: #eef5ff; margin-bottom: 8px; }
        .title p { color: #8a9abb; font-size: 14px; }
        .input-group { margin-bottom: 24px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #c8a15e;
            font-size: 13px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(200,161,94,0.2);
            border-radius: 16px;
            font-size: 16px;
            color: #eef5ff;
        }
        .input-group input:focus {
            outline: none;
            border-color: #c8a15e;
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c8a15e, #a07840);
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #0a1a2e;
            cursor: pointer;
            margin-top: 16px;
        }
        .btn-login:hover { transform: translateY(-2px); }
        .back-link { text-align: center; margin-top: 24px; }
        .back-link a { color: #8a9abb; text-decoration: none; font-size: 13px; }
        .back-link a:hover { color: #c8a15e; }
        .info-note {
            background: rgba(200,161,94,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-top: 24px;
            text-align: center;
        }
        .info-note p { font-size: 12px; color: #c8a15e; }
        .leaf {
            position: absolute;
            font-size: 100px;
            opacity: 0.04;
            color: #c8a15e;
            pointer-events: none;
        }
        .leaf-1 { top: 20px; left: 20px; }
        .leaf-2 { bottom: 20px; right: 20px; }
        @media (max-width: 600px) {
            body { padding: 20px; }
            .admin-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="leaf leaf-1">❦</div>
    <div class="leaf leaf-2">❦</div>
    <div class="container">
        <div class="admin-card">
            <div class="logo">
                <h1>HEALTHY BOWL</h1>
                <div class="badge">ADMIN PORTAL</div>
            </div>
            <div class="title">
                <h2>Admin Access</h2>
                <p>Enter your admin credentials</p>
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> ADMIN EMAIL</label>
                <input type="email" id="adminEmail" placeholder="admin@cherinebowl.com">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> PASSWORD</label>
                <input type="password" id="adminPassword" placeholder="Enter your password">
            </div>
            <button class="btn-login" onclick="adminLogin()">Login to Admin</button>
            <div class="back-link">
                <a href="index.html">← Back to Homepage</a>
            </div>
            <div class="info-note">
                <p><i class="fas fa-shield-alt"></i> Authorized personnel only</p>
            </div>
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        // 管理員帳號（固定）
        const ADMIN_CREDENTIALS = {
            email: "admin@cherinebowl.com",
            password: "Admin040907@"
        };

        async function adminLogin() {
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }
            
            if (email !== ADMIN_CREDENTIALS.email || password !== ADMIN_CREDENTIALS.password) {
                alert('Invalid admin credentials');
                return;
            }
            
            // 儲存管理員登入狀態
            localStorage.setItem('adminLoggedIn', 'true');
            localStorage.setItem('adminEmail', email);
            
            // 跳轉到後台
            window.location.href = 'admin.html';
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
