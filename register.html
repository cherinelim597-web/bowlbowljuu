<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Healthy Bowl</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="main-container">
    <div class="leaf l1">❦</div>
    <div class="leaf l2">❦</div>
    <div class="leaf l3">❦</div>
    <div class="leaf l4">❦</div>

    <div class="language-switch">
        <button onclick="document.documentElement.lang='en'">EN</button>
        <button onclick="document.documentElement.lang='zh'">中文</button>
    </div>

    <div class="header" style="padding-bottom: 20px;">
        <h1>CREATE ACCOUNT</h1>
        <div class="subtitle">Join Healthy Bowl today</div>
        <div class="chinese">立即加入 Healthy Bowl</div>
    </div>

    <div class="content">
        <div class="inner-card card-limited">
            <div class="input-group">
                <label>Full Name / 全名</label>
                <input id="fullName" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Email (Optional) / 郵箱 (選填)</label>
                <input id="email" type="email" placeholder="example@email.com">
                <small style="color:#8a9abb; font-size:12px;">Leave blank to use guest account / 留空將使用訪客帳號</small>
            </div>
            <button class="btn" onclick="register()">Create Account / 註冊</button>
            <div class="link">
                <a href="login.html">Already have an account? Sign In / 已有帳號？登入</a>
            </div>
        </div>
    </div>

    <div class="footer">
        EAT WELL. LIVE WELL.
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
