<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Healthy Bowl</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="language-switch">
    <button onclick="document.documentElement.lang='en'">English</button>
    <button onclick="document.documentElement.lang='zh'">中文</button>
</div>

<div class="container">
    <div class="card">
        <div class="logo">🥗 Healthy Bowl</div>
        <div class="subtitle">Create Account</div>
        <div class="subtitle lang-zh">建立帳號</div>

        <div class="input-group">
            <label>Full Name</label>
            <label class="lang-zh">全名</label>
            <input id="fullName" placeholder="John Doe">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <label class="lang-zh">電話號碼</label>
            <input id="phone" type="tel" placeholder="0912345678">
        </div>

        <div class="input-group">
            <label>Delivery Address</label>
            <label class="lang-zh">送餐地址</label>
            <input id="address" placeholder="Your full address">
        </div>

        <div class="input-group">
            <label>Email</label>
            <label class="lang-zh">電子郵件</label>
            <input id="email" type="email" placeholder="example@email.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <label class="lang-zh">密碼</label>
            <input id="password" type="password" placeholder="At least 6 characters">
        </div>

        <button class="btn" onclick="register()">Create Account</button>
        <button class="btn lang-zh" onclick="register()">註冊</button>

        <div class="link">
            <a href="login.html">Already have an account? Sign In</a>
            <a href="login.html" class="lang-zh">已有帳號？登入</a>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
