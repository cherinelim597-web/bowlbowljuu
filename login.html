<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Healthy Bowl</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="language-switch">
    <button onclick="document.documentElement.lang='en'">English</button>
    <button onclick="document.documentElement.lang='zh'">中文</button>
</div>

<div class="container">
    <div class="card">
        <div class="logo">🥗 Healthy Bowl</div>
        <div class="subtitle">Welcome Back</div>
        <div class="subtitle lang-zh">歡迎回來</div>

        <div class="input-group">
            <label>Email</label>
            <label class="lang-zh">電子郵件</label>
            <input id="email" type="email" placeholder="example@email.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <label class="lang-zh">密碼</label>
            <input id="password" type="password" placeholder="Enter your password">
        </div>

        <button class="btn" onclick="login()">Sign In</button>
        <button class="btn lang-zh" onclick="login()">登入</button>

        <div class="link">
            <a href="register.html">Don't have an account? Create one</a>
            <a href="register.html" class="lang-zh">還沒有帳號？立即註冊</a>
        </div>
        
        <div class="link">
            <a href="admin.html" style="color: var(--gold);">Admin Login</a>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
