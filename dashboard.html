<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Healthy Bowl | 玻璃奢華</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('https://images.unsplash.com/photo-1505253758473-96b7015fcd40?q=80&w=2070') center/cover fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10,20,40,0.85), rgba(5,15,30,0.9));
            z-index: 0;
        }

        .dashboard {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 玻璃卡片效果 */
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* 頂欄 */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 32px;
        }

        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #c8a15e, #f0d49e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .language-switch {
            display: flex;
            gap: 10px;
        }

        .language-switch button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(200,161,94,0.3);
            padding: 8px 16px;
            border-radius: 30px;
            color: #eef5ff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .language-switch button:hover {
            background: rgba(200,161,94,0.3);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.08);
            padding: 8px 20px 8px 24px;
            border-radius: 60px;
        }

        .user-text {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            color: #eef5ff;
        }

        .user-plan {
            font-size: 11px;
            color: #c8a15e;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #c8a15e, #a07840);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #0a1a2e;
        }

        /* 歡迎區 */
        .hero-gold {
            text-align: center;
            padding: 50px 40px;
            margin-bottom: 40px;
        }

        .hero-gold h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 500;
            color: #c8a15e;
            margin-bottom: 12px;
        }

        .hero-gold p {
            color: rgba(255,255,255,0.7);
            font-size: 18px;
        }

        .hero-gold .decor {
            font-size: 24px;
            margin-top: 16px;
            letter-spacing: 8px;
            color: #c8a15e;
        }

        /* 統計卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-glass {
            padding: 28px 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-glass:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
        }

        .stat-icon {
            font-size: 36px;
            color: #c8a15e;
            margin-bottom: 16px;
        }

        .stat-number {
            font-size: 38px;
            font-weight: 700;
            color: #eef5ff;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 雙欄 */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
        }

        .info-card {
            padding: 32px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .card-header i {
            font-size: 24px;
            color: #c8a15e;
        }

        .card-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: #eef5ff;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-label {
            color: rgba(255,255,255,0.5);
        }

        .info-value {
            color: #eef5ff;
            font-weight: 500;
        }

        .progress-wrapper {
            margin: 24px 0;
        }

        .progress-track {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }

        .progress-thumb {
            background: linear-gradient(90deg, #c8a15e, #e8c48a);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .delivery-item-glass {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .delivery-day {
            font-weight: 500;
            color: #eef5ff;
        }

        .delivery-date {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .delivery-badge {
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
        }

        .badge-gold {
            background: rgba(200, 161, 94, 0.2);
            color: #c8a15e;
        }

        .badge-light {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }

        .btn-glass {
            width: 100%;
            padding: 14px;
            background: rgba(200, 161, 94, 0.15);
            border: 1px solid rgba(200, 161, 94, 0.3);
            border-radius: 40px;
            color: #c8a15e;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 24px;
        }

        .btn-glass:hover {
            background: rgba(200, 161, 94, 0.3);
        }

        .action-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .action-group .btn-glass {
            margin-top: 0;
            flex: 1;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: #c8a15e;
        }

        @media (max-width: 900px) {
            body { padding: 20px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .hero-gold h2 { font-size: 32px; }
            .top-section { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="top-section glass">
            <div class="logo">
                <h1>HEALTHY BOWL</h1>
            </div>
            <div class="language-switch">
                <button onclick="document.documentElement.lang='en'">EN</button>
                <button onclick="document.documentElement.lang='zh'">中文</button>
            </div>
            <div class="user-badge" id="userBadge">
                <div class="user-text">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-plan" id="userPlan">Premium Member</div>
                </div>
                <div class="user-avatar" id="userAvatar">👤</div>
            </div>
        </div>

        <div class="hero-gold glass">
            <h2 id="welcomeTitle">Your Wellness Ritual</h2>
            <p id="welcomeText">Nourishing your body, one bowl at a time</p>
            <div class="decor">❦ ❦ ❦</div>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-glass glass">
                <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="stat-number" id="daysActive">—</div>
                <div class="stat-label">Days Active</div>
            </div>
            <div class="stat-glass glass">
                <div class="stat-icon"><i class="fas fa-utensil-spoon"></i></div>
                <div class="stat-number" id="mealsProgress">—</div>
                <div class="stat-label">Meals Served</div>
            </div>
            <div class="stat-glass glass">
                <div class="stat-icon"><i class="fas fa-crown"></i></div>
                <div class="stat-number" id="planType">—</div>
                <div class="stat-label">Current Plan</div>
            </div>
            <div class="stat-glass glass">
                <div class="stat-icon"><i class="fas fa-hourglass-half"></i></div>
                <div class="stat-number" id="daysLeft">—</div>
                <div class="stat-label">Days Left</div>
            </div>
        </div>

        <div class="content-grid" id="contentGrid">
            <div class="info-card glass">
                <div class="card-header">
                    <i class="fas fa-chart-simple"></i>
                    <h3>Subscription Details</h3>
                </div>
                <div id="subscriptionDetails">
                    <div class="loading-spinner">Loading...</div>
                </div>
                <button class="btn-glass" id="renewBtn" onclick="location.href='onboarding.html'"><i class="fas fa-redo-alt"></i> Renew Subscription</button>
            </div>

            <div class="info-card glass">
                <div class="card-header">
                    <i class="fas fa-truck-fast"></i>
                    <h3>Upcoming Deliveries</h3>
                </div>
                <div id="deliveryList">
                    <div class="loading-spinner">Loading...</div>
                </div>
                <div class="action-group">
    <button class="btn-glass" onclick="location.href='settings.html'"><i class="fas fa-user-cog"></i> Settings</button>
    <button class="btn-glass" onclick="location.href='invite.html'"><i class="fas fa-gift"></i> Invite</button>
    <button class="btn-glass" onclick="location.href='receipt.html'"><i class="fas fa-receipt"></i> Receipts</button>
    <button class="btn-glass" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
            </div>
        </div>
    </div>

        <script src="js/supabase.js"></script>
<script src="js/time-utils.js"></script>
<script src="js/dashboard.js"></script>
    <script>
        // ============================================
        // 儀表板邏輯 - 使用 localStorage
        // ============================================

        // 獲取當前用戶
        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return null;
            try {
                return JSON.parse(userStr);
            } catch {
                return null;
            }
        }

        // 登出
        function logout() {
            localStorage.removeItem('currentUser');
            location.href = 'login.html';
        }

        // 獲取方案名稱
        function getPlanName(planType, lang = 'en') {
            const planNames = {
                en: { single: 'Single', weekly: 'Weekly', '1month': '1 Month', '2months': '2 Months', '3months': '3 Months' },
                zh: { single: '單次', weekly: '週方案', '1month': '1個月', '2months': '2個月', '3months': '3個月' }
            };
            return planNames[lang]?.[planType] || planType;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleDateString();
        }

        // 加載儀表板
        async function loadDashboard() {
            const user = getCurrentUser();
            
            if (!user) {
                location.href = 'login.html';
                return;
            }
            
            // 顯示用戶名稱
            const displayName = user.full_name || user.email?.split('@')[0] || 'Member';
            document.getElementById('userName').innerText = displayName;
            document.getElementById('userAvatar').innerHTML = displayName.charAt(0).toUpperCase();
            
            // 語言切換時更新歡迎語
            const isZh = document.documentElement.lang === 'zh';
            document.getElementById('welcomeTitle').innerText = isZh ? '您的健康儀式' : 'Your Wellness Ritual';
            document.getElementById('welcomeText').innerText = isZh ? '每一餐，滋養您的身體' : 'Nourishing your body, one bowl at a time';
            
            // 獲取 active 訂閱
            const { data: subscription } = await supabaseClient
                .from('subscriptions')
                .select('*')
                .eq('user_id', user.id)
                .eq('status', 'active')
                .maybeSingle();
            
            if (!subscription) {
                // 無訂閱，顯示提示
                document.getElementById('subscriptionDetails').innerHTML = `
                    <div class="info-row">
                        <span class="info-label">Status</span>
                        <span class="info-value" style="color: #c8a15e;">No active plan</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Message</span>
                        <span class="info-value">Please subscribe to start your journey</span>
                    </div>
                `;
                document.getElementById('deliveryList').innerHTML = '<div class="delivery-item-glass" style="justify-content: center;">No active subscription</div>';
                document.getElementById('statsRow').style.opacity = '0.5';
                return;
            }
            
            // 計算數據
            const startDate = new Date(subscription.start_date);
            const endDate = new Date(subscription.end_date);
            const today = new Date();
            
            const totalDays = subscription.total_days;
            const mealsReceived = subscription.meals_received || 0;
            const daysActive = Math.ceil((today - startDate) / (1000 * 60 * 60 * 24)) + 1;
            const daysRemaining = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
            const progressPercent = (mealsReceived / totalDays) * 100;
            
            // 更新統計卡片
            document.getElementById('daysActive').innerText = daysActive > 0 ? daysActive : 1;
            document.getElementById('mealsProgress').innerText = `${mealsReceived}/${totalDays}`;
            document.getElementById('planType').innerText = getPlanName(subscription.plan_type);
            document.getElementById('daysLeft').innerText = daysRemaining > 0 ? daysRemaining : 0;
            
            // 更新訂閱詳情
            document.getElementById('subscriptionDetails').innerHTML = `
                <div class="info-row">
                    <span class="info-label">Plan</span>
                    <span class="info-value">${getPlanName(subscription.plan_type)} Premium</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Period</span>
                    <span class="info-value">${formatDate(subscription.start_date)} - ${formatDate(subscription.end_date)}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Meals Included</span>
                    <span class="info-value">${totalDays} meals</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Investment</span>
                    <span class="info-value">RM ${subscription.total_price}</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-track">
                        <div class="progress-thumb" style="width: ${progressPercent}%"></div>
                    </div>
                    <div class="progress-labels">
                        <span>🍽️ ${mealsReceived} completed</span>
                        <span>⏳ ${totalDays - mealsReceived} remaining</span>
                    </div>
                </div>
            `;
            
            // 加載配送日程
            const { data: deliveries } = await supabaseClient
                .from('deliveries')
                .select('*')
                .eq('user_id', user.id)
                .eq('subscription_id', subscription.id)
                .order('delivery_date', { ascending: true })
                .limit(7);
            
            if (!deliveries || deliveries.length === 0) {
                document.getElementById('deliveryList').innerHTML = '<div class="delivery-item-glass" style="justify-content: center;">No deliveries scheduled</div>';
                return;
            }
            
            const todayStr = today.toISOString().split('T')[0];
            
            document.getElementById('deliveryList').innerHTML = deliveries.map(d => {
                const deliveryDate = new Date(d.delivery_date);
                const isToday = d.delivery_date === todayStr;
                const isDelivered = d.status === 'delivered';
                const dateStr = deliveryDate.toLocaleDateString();
                const dayName = deliveryDate.toLocaleDateString('en', { weekday: 'long' });
                
                let badgeClass = 'badge-light';
                let badgeText = 'Upcoming';
                
                if (isDelivered) {
                    badgeClass = 'badge-gold';
                    badgeText = '✓ Delivered';
                } else if (isToday) {
                    badgeClass = 'badge-gold';
                    badgeText = '🚚 Today';
                }
                
                return `
                    <div class="delivery-item-glass">
                        <div>
                            <div class="delivery-day">${dayName}, ${dateStr}</div>
                            <div class="delivery-date">Meal #${d.meal_number} of ${totalDays}</div>
                        </div>
                        <span class="delivery-badge ${badgeClass}">${badgeText}</span>
                    </div>
                `;
            }).join('');
        }
        
        // 監聽語言變化
        const observer = new MutationObserver(() => {
            const isZh = document.documentElement.lang === 'zh';
            document.getElementById('welcomeTitle').innerText = isZh ? '您的健康儀式' : 'Your Wellness Ritual';
            document.getElementById('welcomeText').innerText = isZh ? '每一餐，滋養您的身體' : 'Nourishing your body, one bowl at a time';
        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });
        
        // 加載數據
        loadDashboard();
    </script>
</body>
</html>
