<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invitations - Healthy Bowl</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('https://images.unsplash.com/photo-1505253758473-96b7015fcd40?q=80&w=2070') center/cover fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(10,20,40,0.85), rgba(5,15,30,0.9));
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 32px;
        }
        .logo h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #c8a15e, #f0d49e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(200,161,94,0.15);
            border: 1px solid rgba(200,161,94,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            color: #c8a15e;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }
        .invite-card {
            padding: 40px;
        }
        .invite-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: #c8a15e;
            margin-bottom: 20px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: #c8a15e;
        }
        .stat-label {
            font-size: 13px;
            color: #8a9abb;
            margin-top: 5px;
        }
        .invite-code-box {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
            border: 1px dashed rgba(200,161,94,0.5);
        }
        .invite-code {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 6px;
            color: #c8a15e;
            font-family: monospace;
        }
        .copy-btn {
            background: #c8a15e;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: #0a1a2e;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        .invited-list {
            margin-top: 30px;
        }
        .invited-list h3 {
            margin-bottom: 15px;
            color: #eef5ff;
        }
        .invited-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .invited-name {
            font-weight: 500;
            color: #eef5ff;
        }
        .invited-date {
            font-size: 12px;
            color: #8a9abb;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #8a9abb;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #c8a15e;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
        }
        @media (max-width: 600px) {
            body { padding: 20px; }
            .invite-card { padding: 24px; }
            .invite-code { font-size: 24px; letter-spacing: 3px; }
            .stats-grid { grid-template-columns: 1fr; }
            .top-section { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-section glass">
            <div class="logo">
                <h1>HEALTHY BOWL</h1>
            </div>
            <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        </div>

        <div class="glass invite-card">
            <div class="invite-title">
                <i class="fas fa-gift"></i> Invite Friends
            </div>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-number" id="totalInvited">0</div>
                    <div class="stat-label">Friends Invited</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="activeCodes">1</div>
                    <div class="stat-label">Your Invitation Code</div>
                </div>
            </div>
            
            <div class="invite-code-box">
                <div class="invite-code" id="invitationCode">Loading...</div>
                <button class="copy-btn" onclick="copyInviteCode()">
                    <i class="fas fa-copy"></i> Copy Code
                </button>
            </div>
            
            <div class="invited-list">
                <h3><i class="fas fa-users"></i> People You've Invited</h3>
                <div id="invitedListContainer">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            EAT WELL. LIVE WELL.
        </div>
    </div>

    <script src="js/supabase.js"></script>
    <script>
        function getCurrentUser() {
            const userStr = localStorage.getItem('currentUser');
            if (!userStr) return null;
            try {
                return JSON.parse(userStr);
            } catch {
                return null;
            }
        }

        function copyInviteCode() {
            const code = document.getElementById('invitationCode').innerText;
            if (code && code !== 'Loading...') {
                navigator.clipboard.writeText(code);
                alert('Invitation code copied! / 邀請碼已複製！');
            }
        }

        async function loadInvitationInfo() {
            const user = getCurrentUser();
            if (!user) {
                location.href = 'login.html';
                return;
            }
            
            // 獲取用戶自己的邀請碼
            const { data: dbUser, error: userError } = await supabaseClient
                .from('users')
                .select('invitation_code, full_name')
                .eq('id', user.id)
                .single();
            
            if (userError) {
                console.error('Error loading user:', userError);
                document.getElementById('invitationCode').innerText = 'Error';
                return;
            }
            
            if (dbUser && dbUser.invitation_code) {
                document.getElementById('invitationCode').innerText = dbUser.invitation_code;
            } else {
                document.getElementById('invitationCode').innerText = 'No code';
            }
            
            // 獲取使用該用戶邀請碼註冊的人（referred_by = 用戶ID）
            const { data: invitedUsers, error: invitedError } = await supabaseClient
                .from('users')
                .select('full_name, created_at')
                .eq('referred_by', user.id)
                .order('created_at', { ascending: false });
            
            if (invitedError) {
                console.error('Error loading invited users:', invitedError);
                return;
            }
            
            // 更新統計數字
            const totalInvited = invitedUsers?.length || 0;
            document.getElementById('totalInvited').innerText = totalInvited;
            
            // 顯示邀請列表
            const container = document.getElementById('invitedListContainer');
            if (totalInvited === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-user-plus"></i> No one has used your invitation code yet.<br>Share your code to invite friends!</div>';
            } else {
                container.innerHTML = invitedUsers.map(invited => `
                    <div class="invited-item">
                        <div class="invited-name">
                            <i class="fas fa-user-check"></i> ${escapeHtml(invited.full_name)}
                        </div>
                        <div class="invited-date">
                            ${new Date(invited.created_at).toLocaleDateString()}
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadInvitationInfo();
    </script>
</body>
</html>
