<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Bowl Admin | 奶油軟萌風格</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="shortcut icon" href="#">
</head>
<body>

<div class="app">
    <!-- 側邊欄 -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            🥗 <span>Healthy</span> <span style="color: #f5a0b0;">Bowl</span>
        </div>
        
        <div class="nav-item active" data-page="dashboard">
            <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="users">
            <i class="fas fa-users"></i> <span>User Management</span>
        </div>
        <div class="nav-item" data-page="deliveries">
            <i class="fas fa-truck"></i> <span>Daily Delivery</span>
        </div>
        <div class="nav-item" data-page="invitations">
            <i class="fas fa-ticket-alt"></i> <span>Invitation Records</span>
        </div>
        <div class="nav-item" data-page="receipts">
            <i class="fas fa-receipt"></i> <span>Receipts</span>
        </div>
        <div class="nav-item" data-page="reports">
            <i class="fas fa-chart-line"></i> <span>Reports</span>
        </div>
        
        <div style="margin-top: auto; margin-bottom: 20px;">
            <div class="nav-item" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </div>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="main">
        <!-- 頂部欄 -->
        <div class="top-bar">
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="admin-info">
                <i class="fas fa-user-circle"></i>
                <span id="adminEmail">Admin</span>
                <span class="language-switch-admin">
                    <button onclick="setLanguage('en')">EN</button>
                    <button onclick="setLanguage('zh')">中文</button>
                </span>
            </div>
        </div>

        <!-- 頁面容器 -->
        <div id="page_dashboard" class="page active"></div>
        <div id="page_users" class="page"></div>
        <div id="page_deliveries" class="page"></div>
        <div id="page_invitations" class="page"></div>
        <div id="page_receipts" class="page"></div>
        <div id="page_reports" class="page"></div>
    </div>
</div>

<!-- 用戶編輯 Modal（保留原有結構） -->
<div id="userModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3><i class="fas fa-user-edit"></i> Edit User</h3>
        <input type="hidden" id="editUserId">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="editFullName">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="editPhone">
        </div>
        <div class="input-group">
            <label>Address</label>
            <input type="text" id="editAddress">
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveUserEdit()">Save</button>
            <button class="btn-cancel" onclick="closeUserModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- 上傳收據 Modal（保留原有結構） -->
<div id="receiptModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3><i class="fas fa-upload"></i> Upload Receipt</h3>
        <input type="hidden" id="receiptUserId">
        <div class="input-group">
            <label>Amount (RM)</label>
            <input type="number" id="receiptAmount" placeholder="Enter amount in RM">
        </div>
        <div class="input-group">
            <label>Receipt Image</label>
            <input type="file" id="receiptFile" accept="image/*,.pdf">
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="uploadReceipt()">Upload</button>
            <button class="btn-cancel" onclick="closeReceiptModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/time-utils.js"></script>
<script src="js/admin-common.js"></script>
<script src="js/admin-dashboard.js"></script>
<script src="js/admin-deliveries.js"></script>
<script src="js/admin-invitations.js"></script>
<script src="js/admin-receipt.js"></script>
<script src="js/admin-reports.js"></script>
<script src="js/admin-users.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
