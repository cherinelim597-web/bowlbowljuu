<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Healthy Bowl Admin | 奶油軟萌風格</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="shortcut icon" href="#">
</head>
<body>

<!-- 手機版頂部欄 -->
<div class="mobile-header">
    <button class="mobile-menu-btn" onclick="toggleMobileSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    <div class="mobile-logo">
        🥗 Healthy Bowl
    </div>
    <div class="mobile-user" onclick="location.href='#'">
        <i class="fas fa-user-circle"></i>
    </div>
</div>

<!-- 手機版側邊欄 -->
<div class="mobile-sidebar" id="mobileSidebar">
    <div class="mobile-sidebar-header">
        <div class="mobile-sidebar-logo">🥗 Healthy Bowl</div>
        <button class="mobile-sidebar-close" onclick="toggleMobileSidebar()">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="mobile-sidebar-nav">
        <div class="mobile-nav-item active" data-page="dashboard">
            <i class="fas fa-chart-pie"></i> 儀表板
        </div>
        <div class="mobile-nav-item" data-page="users">
            <i class="fas fa-users"></i> 用戶管理
        </div>
        <div class="mobile-nav-item" data-page="deliveries">
            <i class="fas fa-truck"></i> 每日配送
        </div>
        <div class="mobile-nav-item" data-page="invitations">
            <i class="fas fa-ticket-alt"></i> 邀請記錄
        </div>
        <div class="mobile-nav-item" data-page="receipts">
            <i class="fas fa-receipt"></i> 收據管理
        </div>
        <div class="mobile-nav-item" data-page="reports">
            <i class="fas fa-chart-line"></i> 報表統計
        </div>
        <div class="mobile-nav-item" id="mobileLogoutBtn">
            <i class="fas fa-sign-out-alt"></i> 登出
        </div>
    </div>
</div>

<!-- 手機版遮罩 -->
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMobileSidebar()"></div>

<!-- 手機版底部導航欄 -->
<div class="mobile-bottom-nav">
    <div class="bottom-nav-item active" data-page="dashboard">
        <i class="fas fa-chart-pie"></i>
        <span>首頁</span>
    </div>
    <div class="bottom-nav-item" data-page="users">
        <i class="fas fa-users"></i>
        <span>用戶</span>
    </div>
    <div class="bottom-nav-item" data-page="deliveries">
        <i class="fas fa-truck"></i>
        <span>配送</span>
    </div>
    <div class="bottom-nav-item" data-page="receipts">
        <i class="fas fa-receipt"></i>
        <span>收據</span>
    </div>
    <div class="bottom-nav-item" data-page="reports">
        <i class="fas fa-chart-line"></i>
        <span>報表</span>
    </div>
</div>

<!-- 主應用內容 -->
<div class="app">
    <!-- 側邊欄（電腦版） -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            🥗 <span>Healthy</span> <span style="color: #f5a0b0;">Bowl</span>
        </div>
        
        <div class="nav-item active" data-page="dashboard">
            <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="users">
            <i class="fas fa-users"></i> <span>User Management</span>
        </div>
        <div class="nav-item" data-page="deliveries">
            <i class="fas fa-truck"></i> <span>Daily Delivery</span>
        </div>
        <div class="nav-item" data-page="invitations">
            <i class="fas fa-ticket-alt"></i> <span>Invitation Records</span>
        </div>
        <div class="nav-item" data-page="receipts">
            <i class="fas fa-receipt"></i> <span>Receipts</span>
        </div>
        <div class="nav-item" data-page="reports">
            <i class="fas fa-chart-line"></i> <span>Reports</span>
        </div>
        
        <div style="margin-top: auto; margin-bottom: 20px;">
            <div class="nav-item" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </div>
        </div>
    </div>

    <!-- 主內容區 -->
    <div class="main">
        <!-- 頂部欄（電腦版） -->
        <div class="top-bar">
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="admin-info">
                <i class="fas fa-user-circle"></i>
                <span id="adminEmail">Admin</span>
                <span class="language-switch-admin">
                    <button onclick="setLanguage('en')">EN</button>
                    <button onclick="setLanguage('zh')">中文</button>
                </span>
            </div>
        </div>

        <!-- 頁面容器 -->
        <div id="page_dashboard" class="page active"></div>
        <div id="page_users" class="page"></div>
        <div id="page_deliveries" class="page"></div>
        <div id="page_invitations" class="page"></div>
        <div id="page_receipts" class="page"></div>
        <div id="page_reports" class="page"></div>
    </div>
</div>

<!-- 用戶編輯 Modal -->
<div id="userModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3><i class="fas fa-user-edit"></i> Edit User</h3>
        <input type="hidden" id="editUserId">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="editFullName">
        </div>
        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="editPhone">
        </div>
        <div class="input-group">
            <label>Address</label>
            <input type="text" id="editAddress">
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="saveUserEdit()">Save</button>
            <button class="btn-cancel" onclick="closeUserModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- 上傳收據 Modal -->
<div id="receiptModal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <h3><i class="fas fa-upload"></i> Upload Receipt</h3>
        <input type="hidden" id="receiptUserId">
        <div class="input-group">
            <label>Amount (RM)</label>
            <input type="number" id="receiptAmount" placeholder="Enter amount in RM">
        </div>
        <div class="input-group">
            <label>Receipt Image</label>
            <input type="file" id="receiptFile" accept="image/*,.pdf">
        </div>
        <div class="modal-buttons">
            <button class="btn-save" onclick="uploadReceipt()">Upload</button>
            <button class="btn-cancel" onclick="closeReceiptModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/time-utils.js"></script>
<script src="js/admin-common.js"></script>
<script src="js/admin-dashboard.js"></script>
<script src="js/admin-deliveries.js"></script>
<script src="js/admin-invitations.js"></script>
<script src="js/admin-receipt.js"></script>
<script src="js/admin-reports.js"></script>
<script src="js/admin-users.js"></script>
<script src="js/admin.js"></script>

<script>
    // 手機版側邊欄控制
    function toggleMobileSidebar() {
        const sidebar = document.getElementById('mobileSidebar');
        const overlay = document.getElementById('mobileOverlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
    }
    
    function updateMobileActiveStates(page) {
        // 更新底部導航 active 狀態
        document.querySelectorAll('.bottom-nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-page') === page) {
                item.classList.add('active');
            }
        });
        // 更新側邊欄 active 狀態
        document.querySelectorAll('.mobile-nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-page') === page) {
                item.classList.add('active');
            }
        });
    }
    
    // 綁定手機版導航點擊事件
    document.addEventListener('DOMContentLoaded', function() {
        // 底部導航點擊
        document.querySelectorAll('.bottom-nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                if (page && typeof showPage === 'function') {
                    showPage(page);
                    updateMobileActiveStates(page);
                }
            });
        });
        
        // 側邊欄導航點擊
        document.querySelectorAll('.mobile-nav-item').forEach(item => {
            item.addEventListener('click', function() {
                const page = this.getAttribute('data-page');
                if (page && typeof showPage === 'function') {
                    showPage(page);
                    // 關閉側邊欄
                    const sidebar = document.getElementById('mobileSidebar');
                    const overlay = document.getElementById('mobileOverlay');
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                    updateMobileActiveStates(page);
                }
            });
        });
        
        // 手機版登出
        const mobileLogout = document.getElementById('mobileLogoutBtn');
        if (mobileLogout && typeof adminLogout === 'function') {
            mobileLogout.addEventListener('click', adminLogout);
        }
    });
</script>

</body>
</html>
