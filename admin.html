<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Healthy Bowl</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div class="language-switch">
    <button onclick="document.documentElement.lang='en'">English</button>
    <button onclick="document.documentElement.lang='zh'">中文</button>
</div>

<div class="container admin-container">
    <div class="card">
        <div class="logo">🥗 Healthy Bowl Admin</div>
        <div class="subtitle">User & Order Management</div>
        <div class="subtitle lang-zh">用戶與訂單管理</div>
        
        <!-- Admin Login Section -->
        <div id="adminLoginSection" class="admin-login">
            <div class="input-group">
                <label>Admin Email</label>
                <input type="email" id="adminEmail" placeholder="admin@healthybowl.com">
            </div>
            <div class="input-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="********">
            </div>
            <button class="btn" onclick="adminLogin()">Login as Admin</button>
        </div>
        
        <!-- Admin Dashboard (hidden until login) -->
        <div id="adminDashboard" style="display: none;">
            <div class="admin-header">
                <h3>User Management</h3>
                <button class="btn-small" onclick="adminLogout()">Logout</button>
            </div>
            
            <!-- User List -->
            <div class="user-list" id="userList">
                <p>Loading users...</p>
            </div>
        </div>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/admin.js"></script>

</body>
</html>
